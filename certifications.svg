    <circle cx="32" cy="36" r="26" fill="none" stroke="#1A5C2A" stroke-width="1"/>
    <text x="32" y="28" font-family="Arial Black" font-size="9" font-weight="900" fill="#1A5C2A" text-anchor="middle">CERTIFIED</text>
    <text x="32" y="40" font-family="Arial Black" font-size="11" font-weight="900" fill="#1A5C2A" text-anchor="middle">ISO</text>
    <text x="32" y="52" font-family="Arial" font-size="7" fill="#1A5C2A" text-anchor="middle">9001:2015</text>
  </g>
  <!-- ISO 27001 -->
  <g transform="translate(70,0)">
