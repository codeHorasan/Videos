<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" fill="none">
  <!-- Background glow -->
  <ellipse cx="260" cy="200" rx="200" ry="160" fill="url(#bgGlow)" opacity="0.3"/>
  
  <!-- ID Card floating left -->
  <g transform="translate(30, 160) rotate(-8)">
    <rect width="120" height="80" rx="8" fill="white" stroke="#1A3C8F" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="8" y="8" width="30" height="38" rx="4" fill="#E8EEF8"/>
    <circle cx="23" cy="22" r="10" fill="#B8CCE8"/>
    <rect x="8" y="34" width="30" height="4" rx="2" fill="#D0DCF0"/>
    <rect x="46" y="12" width="60" height="6" rx="3" fill="#1A3C8F" opacity="0.7"/>
    <rect x="46" y="24" width="45" height="4" rx="2" fill="#94A8C8"/>
    <rect x="46" y="34" width="50" height="4" rx="2" fill="#94A8C8"/>
    <rect x="8" y="56" width="104" height="3" rx="1.5" fill="#D0DCF0"/>
    <rect x="8" y="64" width="80" height="3" rx="1.5" fill="#D0DCF0"/>
    <!-- Flag chip -->
    <rect x="90" y="60" width="22" height="14" rx="2" fill="#1A3C8F" opacity="0.2"/>
    <rect x="93" y="64" width="6" height="6" rx="1" fill="#1A3C8F" opacity="0.5"/>
  </g>

  <!-- Main phone mockup -->
  <g transform="translate(160, 30)">
    <!-- Phone body -->
    <rect x="20" y="0" width="160" height="320" rx="22" fill="#0D1B4B"/>
    <rect x="24" y="4" width="152" height="312" rx="19" fill="#111E50"/>
    <!-- Screen -->
    <rect x="28" y="12" width="144" height="296" rx="16" fill="#0A1640"/>
    <!-- Notch -->
    <rect x="70" y="12" width="60" height="18" rx="9" fill="#0D1B4B"/>
    
    <!-- AIATUS AI header on screen -->
    <rect x="28" y="30" width="144" height="32" fill="#0D2060"/>
    <rect x="38" y="38" width="8" height="8" rx="2" fill="#1A3C8F"/>
    <text x="52" y="47" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="white">AIATUS AI</text>
    <text x="120" y="47" font-family="Arial, sans-serif" font-size="7" fill="#7090C0">Identity Verification</text>
    
    <!-- Step indicators -->
    <circle cx="68" cy="75" r="5" fill="#1A3C8F"/>
    <circle cx="85" cy="75" r="5" fill="#2A5CC8"/>
    <circle cx="102" cy="75" r="5" fill="#3A6CD8"/>
    <circle cx="119" cy="75" r="5" fill="#E8EEF8" opacity="0.3"/>
    <text x="68" y="78" font-family="Arial" font-size="5" fill="white" text-anchor="middle">1</text>
    <text x="85" y="78" font-family="Arial" font-size="5" fill="white" text-anchor="middle">2</text>
    <text x="102" y="78" font-family="Arial" font-size="5" fill="white" text-anchor="middle">3</text>
    
    <!-- ID card on screen -->
    <rect x="38" y="90" width="124" height="80" rx="8" fill="#162050"/>
    <rect x="44" y="96" width="34" height="46" rx="4" fill="#1A3060"/>
    <!-- Face circle on card -->
    <circle cx="61" cy="112" r="13" fill="#2A4080"/>
    <circle cx="61" cy="107" r="6" fill="#4A6AAA"/>
    <ellipse cx="61" cy="119" rx="9" ry="5" fill="#4A6AAA"/>
    <!-- Card text lines -->
    <text x="86" y="102" font-family="Arial" font-size="5" fill="#8AAAD0">TÜRKİYE CUMHURİYETİ</text>
    <text x="86" y="110" font-family="Arial" font-size="4" fill="#6A8AB0">KİMLİK KARTI</text>
    <rect x="86" y="114" width="70" height="3" rx="1.5" fill="#3A5A90" opacity="0.8"/>
    <rect x="86" y="120" width="55" height="3" rx="1.5" fill="#3A5A90" opacity="0.6"/>
    <rect x="86" y="126" width="60" height="3" rx="1.5" fill="#3A5A90" opacity="0.6"/>
    <rect x="44" y="148" width="118" height="8" rx="2" fill="#1A3060"/>
    <rect x="44" y="160" width="118" height="6" rx="2" fill="#1A3060" opacity="0.6"/>

    <!-- Instruction text -->
    <text x="100" y="184" font-family="Arial" font-size="7" fill="#8AAAD0" text-anchor="middle">Align the front of your ID within the frame</text>
    <text x="100" y="194" font-family="Arial" font-size="7" fill="#6A8AB0" text-anchor="middle">Make sure all details are clearly visible</text>

    <!-- Capture button -->
    <circle cx="100" cy="215" r="16" fill="#1A3C8F" opacity="0.3"/>
    <circle cx="100" cy="215" r="12" fill="#1A3C8F"/>
    <circle cx="100" cy="215" r="8" fill="#2A5CC8"/>

    <!-- Bottom nav -->
    <rect x="28" y="272" width="144" height="36" fill="#0D1B4B"/>
    <text x="60" y="294" font-family="Arial" font-size="6" fill="#5A7AAA" text-anchor="middle">Home</text>
    <text x="100" y="294" font-family="Arial" font-size="6" fill="#2A5CC8" text-anchor="middle">Verify</text>
    <text x="140" y="294" font-family="Arial" font-size="6" fill="#5A7AAA" text-anchor="middle">Settings</text>
  </g>

  <!-- Face recognition overlay right of phone -->
  <g transform="translate(350, 80)">
    <rect width="130" height="150" rx="12" fill="white" opacity="0.95" filter="url(#cardShadow2)"/>
    <!-- Face circle -->
    <circle cx="65" cy="65" r="45" fill="#E8EEF8"/>
    <circle cx="65" cy="55" r="20" fill="#B8CCE8"/>
    <ellipse cx="65" cy="78" rx="28" ry="16" fill="#B8CCE8"/>
    <!-- Scan lines -->
    <rect x="20" y="20" width="50" height="3" rx="1.5" fill="#1A3C8F" opacity="0.4"/>
    <rect x="60" y="20" width="50" height="3" rx="1.5" fill="#1A3C8F" opacity="0.4"/>
    <rect x="20" y="107" width="50" height="3" rx="1.5" fill="#1A3C8F" opacity="0.4"/>
    <rect x="60" y="107" width="50" height="3" rx="1.5" fill="#1A3C8F" opacity="0.4"/>
    <!-- Corner brackets -->
    <path d="M20 35 L20 20 L35 20" stroke="#1A3C8F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M95 20 L110 20 L110 35" stroke="#1A3C8F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M20 95 L20 110 L35 110" stroke="#1A3C8F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M95 110 L110 110 L110 95" stroke="#1A3C8F" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <rect x="15" y="122" width="100" height="20" rx="10" fill="#22C55E" opacity="0.15"/>
    <circle cx="30" cy="132" r="6" fill="#22C55E"/>
    <text x="40" y="136" font-family="Arial" font-size="9" font-weight="700" fill="#22C55E">Liveness Verified</text>
  </g>

  <!-- Floating badges -->
  <g transform="translate(365, 250)">
    <rect width="115" height="40" rx="10" fill="white" filter="url(#cardShadow2)"/>
    <circle cx="20" cy="20" r="12" fill="#EEF2FF"/>
    <text x="20" y="25" font-family="Arial" font-size="14" fill="#1A3C8F" text-anchor="middle">🔒</text>
    <text x="38" y="17" font-family="Arial" font-size="8" font-weight="700" fill="#1A3C8F">Safe Live Auth</text>
    <text x="38" y="27" font-family="Arial" font-size="7" fill="#6A8AB0">Active &amp; Verified</text>
  </g>

  <g transform="translate(20, 280)">
    <rect width="120" height="40" rx="10" fill="white" filter="url(#cardShadow2)"/>
    <circle cx="20" cy="20" r="12" fill="#EEF2FF"/>
    <text x="20" y="25" font-family="Arial" font-size="14" fill="#1A3C8F" text-anchor="middle">🛡️</text>
    <text x="38" y="17" font-family="Arial" font-size="8" font-weight="700" fill="#1A3C8F">Safe ID Auth</text>
    <text x="38" y="27" font-family="Arial" font-size="7" fill="#6A8AB0">Verified Instantly</text>
  </g>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3A6CD8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3A6CD8" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#1A3C8F" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow2" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A3C8F" flood-opacity="0.12"/>
    </filter>
  </defs>
</svg>
