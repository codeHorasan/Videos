<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 460" fill="none">
  <!-- Phone body -->
  <rect x="10" y="0" width="220" height="460" rx="30" fill="#0D1B4B"/>
  <rect x="14" y="4" width="212" height="452" rx="27" fill="#111E50"/>
  <rect x="18" y="10" width="204" height="440" rx="23" fill="#0A1640"/>
  <!-- Notch -->
  <rect x="80" y="10" width="80" height="22" rx="11" fill="#0D1B4B"/>
  
  <!-- Header -->
  <rect x="18" y="32" width="204" height="42" fill="#0D2060"/>
  <rect x="28" y="42" width="10" height="10" rx="2" fill="#1A3C8F"/>
  <text x="46" y="51" font-family="Arial" font-size="11" font-weight="800" fill="white">AIATUS AI</text>
  <text x="120" y="51" font-family="Arial" font-size="9" fill="#7090C0">Identity Verification</text>

  <!-- Progress steps -->
  <circle cx="80" cy="90" r="8" fill="#1A3C8F"/>
  <line x1="88" y1="90" x2="104" y2="90" stroke="#2A5CC8" stroke-width="2"/>
  <circle cx="112" cy="90" r="8" fill="#2A5CC8"/>
  <line x1="120" y1="90" x2="136" y2="90" stroke="#3A6CD8" stroke-width="2"/>
  <circle cx="144" cy="90" r="8" fill="#3A6CD8"/>
  <line x1="152" y1="90" x2="168" y2="90" stroke="#E8EEF8" stroke-width="2" opacity="0.3"/>
  <circle cx="176" cy="90" r="8" fill="#E8EEF8" opacity="0.2"/>
  
  <!-- ID card -->
  <rect x="28" y="110" width="184" height="120" rx="12" fill="#162050" stroke="#2A4080" stroke-width="1"/>
  <!-- Card face area -->
  <rect x="38" y="120" width="54" height="70" rx="6" fill="#1A3060"/>
  <!-- Face -->
  <circle cx="65" cy="144" r="18" fill="#2A4080"/>
  <circle cx="65" cy="138" r="9" fill="#4A6AAA"/>
  <ellipse cx="65" cy="153" rx="13" ry="8" fill="#4A6AAA"/>
  <!-- TR Flag chip -->
  <rect x="44" y="176" width="24" height="8" rx="2" fill="#E30A17"/>
  <circle cx="50" cy="180" r="2.5" fill="white"/>
  <text x="57" y="183" font-family="Arial" font-size="5" fill="white">TR</text>
  
  <!-- Card details -->
  <text x="102" y="128" font-family="Arial" font-size="6" font-weight="700" fill="#8AAAD0">TÜRKİYE CUMHURİYETİ</text>
  <text x="102" y="137" font-family="Arial" font-size="5" fill="#6A8AB0">KİMLİK KARTI</text>
  <rect x="102" y="142" width="98" height="3" rx="1.5" fill="#3A5A90"/>
  <rect x="102" y="149" width="80" height="3" rx="1.5" fill="#3A5A90" opacity="0.7"/>
  <rect x="102" y="156" width="88" height="3" rx="1.5" fill="#3A5A90" opacity="0.7"/>
  <rect x="102" y="163" width="70" height="3" rx="1.5" fill="#3A5A90" opacity="0.5"/>
  <rect x="102" y="170" width="60" height="3" rx="1.5" fill="#3A5A90" opacity="0.5"/>
  
  <!-- MRZ strip -->
  <rect x="38" y="196" width="174" height="10" rx="2" fill="#1A3060"/>
  <rect x="38" y="210" width="174" height="8" rx="2" fill="#1A3060" opacity="0.6"/>
  
  <!-- Instruction -->
  <text x="120" y="248" font-family="Arial" font-size="8" fill="#8AAAD0" text-anchor="middle">Align the front of your ID within the frame</text>
  <text x="120" y="260" font-family="Arial" font-size="8" fill="#6A8AB0" text-anchor="middle">Make sure all details are clearly visible</text>
  
  <!-- Scan corners overlay -->
  <path d="M38 125 L38 112 L52 112" stroke="#3A8CEF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M202 112 L212 112 L212 125" stroke="#3A8CEF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M38 218 L38 228 L52 228" stroke="#3A8CEF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M202 228 L212 228 L212 218" stroke="#3A8CEF" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Capture button -->
  <circle cx="120" cy="310" r="28" fill="#1A3C8F" opacity="0.2"/>
  <circle cx="120" cy="310" r="20" fill="#1A3C8F"/>
  <circle cx="120" cy="310" r="14" fill="#2A5CC8"/>
  <circle cx="120" cy="310" r="8" fill="white" opacity="0.9"/>
  
  <!-- Bottom nav -->
  <rect x="18" y="400" width="204" height="50" rx="12" fill="#0D1B4B"/>
  <text x="65" y="430" font-family="Arial" font-size="8" fill="#5A7AAA" text-anchor="middle">🏠 Home</text>
  <text x="120" y="430" font-family="Arial" font-size="8" fill="#2A5CC8" text-anchor="middle">✓ Verify</text>
  <text x="175" y="430" font-family="Arial" font-size="8" fill="#5A7AAA" text-anchor="middle">⚙ Settings</text>
</svg>
