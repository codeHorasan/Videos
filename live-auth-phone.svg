<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 460" fill="none">
  <!-- Phone body -->
  <rect x="10" y="0" width="220" height="460" rx="30" fill="#0D1B4B"/>
  <rect x="14" y="4" width="212" height="452" rx="27" fill="#111E50"/>
  <rect x="18" y="10" width="204" height="440" rx="23" fill="#0A1640"/>
  <rect x="80" y="10" width="80" height="22" rx="11" fill="#0D1B4B"/>
  
  <!-- Header -->
  <rect x="18" y="32" width="204" height="42" fill="#0D2060"/>
  <text x="120" y="57" font-family="Arial" font-size="11" font-weight="800" fill="white" text-anchor="middle">AIATUS AI</text>

  <!-- Face circle area -->
  <circle cx="120" cy="210" r="110" fill="#0F2060" opacity="0.5"/>
  <circle cx="120" cy="200" r="90" fill="#162050"/>
  
  <!-- Face representation -->
  <circle cx="120" cy="185" r="40" fill="#2A4080"/>
  <circle cx="120" cy="168" r="20" fill="#4A6AAA"/>
  <ellipse cx="120" cy="200" rx="30" ry="18" fill="#4A6AAA"/>
  
  <!-- Scan arc animation hint -->
  <path d="M 36 200 A 84 84 0 0 1 204 200" stroke="#3A8CEF" stroke-width="3" fill="none" stroke-dasharray="8 4" stroke-linecap="round"/>
  
  <!-- Detection dots -->
  <circle cx="95" cy="175" r="4" fill="#3A8CEF"/>
  <circle cx="145" cy="175" r="4" fill="#3A8CEF"/>
  <circle cx="120" cy="160" r="4" fill="#3A8CEF"/>
  <circle cx="88" cy="195" r="3" fill="#3A8CEF"/>
  <circle cx="152" cy="195" r="3" fill="#3A8CEF"/>
  <circle cx="120" cy="205" r="3" fill="#3A8CEF"/>

  <!-- Corner brackets -->
  <path d="M38 115 L38 100 L54 100" stroke="#3A8CEF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M202 100 L218 100 L218 115" stroke="#3A8CEF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M38 300 L38 315 L54 315" stroke="#3A8CEF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M202 315 L218 315 L218 300" stroke="#3A8CEF" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Liveness verified badge -->
  <rect x="40" y="330" width="160" height="36" rx="18" fill="#22C55E" opacity="0.15"/>
  <circle cx="66" cy="348" r="10" fill="#22C55E"/>
  <text x="66" y="352" font-family="Arial" font-size="10" fill="white" text-anchor="middle">✓</text>
  <text x="130" y="345" font-family="Arial" font-size="10" font-weight="700" fill="#22C55E" text-anchor="middle">Liveness Verified</text>
  <text x="130" y="359" font-family="Arial" font-size="8" fill="#4A9A5A" text-anchor="middle">Authentication Successful</text>

  <!-- Bottom icons row -->
  <g transform="translate(38, 385)">
    <!-- Face Motion -->
    <rect x="0" y="0" width="36" height="36" rx="8" fill="#1A3060"/>
    <text x="18" y="24" font-family="Arial" font-size="18" text-anchor="middle">👤</text>
    <text x="18" y="48" font-family="Arial" font-size="6" fill="#8AAAD0" text-anchor="middle">Face</text>
    <text x="18" y="56" font-family="Arial" font-size="6" fill="#8AAAD0" text-anchor="middle">Motion</text>
    <!-- Eye Blink -->
    <rect x="50" y="0" width="36" height="36" rx="8" fill="#1A3060"/>
    <text x="68" y="24" font-family="Arial" font-size="18" text-anchor="middle">👁</text>
    <text x="68" y="48" font-family="Arial" font-size="6" fill="#8AAAD0" text-anchor="middle">Eye</text>
    <text x="68" y="56" font-family="Arial" font-size="6" fill="#8AAAD0" text-anchor="middle">Blink</text>
    <!-- Smiling -->
    <rect x="100" y="0" width="36" height="36" rx="8" fill="#1A3060"/>
    <text x="118" y="24" font-family="Arial" font-size="18" text-anchor="middle">😊</text>
    <text x="118" y="48" font-family="Arial" font-size="6" fill="#8AAAD0" text-anchor="middle">Smiling</text>
    <!-- Live -->
    <rect x="150" y="0" width="36" height="36" rx="8" fill="#1A3060"/>
    <circle cx="168" cy="18" r="8" fill="#22C55E" opacity="0.2"/>
    <circle cx="168" cy="18" r="5" fill="#22C55E"/>
    <text x="168" y="48" font-family="Arial" font-size="6" fill="#22C55E" text-anchor="middle">Live</text>
  </g>
</svg>
