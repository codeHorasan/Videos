<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 460" fill="none">
  <rect x="10" y="0" width="220" height="460" rx="30" fill="#0D1B4B"/>
  <rect x="14" y="4" width="212" height="452" rx="27" fill="#111E50"/>
  <rect x="18" y="10" width="204" height="440" rx="23" fill="#0A1640"/>
  <rect x="80" y="10" width="80" height="22" rx="11" fill="#0D1B4B"/>
  
  <rect x="18" y="32" width="204" height="42" fill="#0D2060"/>
  <text x="120" y="57" font-family="Arial" font-size="11" font-weight="800" fill="white" text-anchor="middle">AIATUS AI</text>
  <text x="120" y="70" font-family="Arial" font-size="8" fill="#7090C0" text-anchor="middle">Signature Verification</text>

  <!-- Signature Verified badge -->
  <rect x="38" y="90" width="164" height="28" rx="14" fill="#22C55E" opacity="0.15" stroke="#22C55E" stroke-width="1"/>
  <circle cx="58" cy="104" r="8" fill="#22C55E"/>
  <text x="58" y="108" font-family="Arial" font-size="9" fill="white" text-anchor="middle">✓</text>
  <text x="130" y="109" font-family="Arial" font-size="9" font-weight="700" fill="#22C55E" text-anchor="middle">Signature Verified</text>

  <!-- Extracted Signature area -->
  <text x="38" y="135" font-family="Arial" font-size="8" fill="#8AAAD0">Extracted Signature</text>
  <rect x="38" y="142" width="164" height="70" rx="8" fill="#162050"/>
  <!-- Cursive signature path -->
  <path d="M 55 185 C 65 165, 80 160, 95 175 C 100 180, 108 190, 120 178 C 132 166, 148 162, 160 178 C 168 188, 175 195, 185 182" stroke="#1A3C8F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 60 192 C 75 188, 90 193, 105 190" stroke="#1A3C8F" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Verification results -->
  <text x="38" y="230" font-family="Arial" font-size="8" fill="#8AAAD0">Verification Result</text>
  
  <g transform="translate(38, 238)">
    <circle cx="8" cy="10" r="5" fill="#22C55E"/>
    <text x="8" y="13" font-family="Arial" font-size="6" fill="white" text-anchor="middle">✓</text>
    <text x="20" y="13" font-family="Arial" font-size="8" fill="#8AAAD0">Signature Matched</text>
    <text x="155" y="13" font-family="Arial" font-size="8" fill="#22C55E">98.7%</text>
    
    <circle cx="8" cy="30" r="5" fill="#22C55E"/>
    <text x="8" y="33" font-family="Arial" font-size="6" fill="white" text-anchor="middle">✓</text>
    <text x="20" y="33" font-family="Arial" font-size="8" fill="#8AAAD0">Pattern Consistency</text>
    <text x="155" y="33" font-family="Arial" font-size="8" fill="#22C55E">96.2%</text>
    
    <circle cx="8" cy="50" r="5" fill="#22C55E"/>
    <text x="8" y="53" font-family="Arial" font-size="6" fill="white" text-anchor="middle">✓</text>
    <text x="20" y="53" font-family="Arial" font-size="8" fill="#8AAAD0">Stroke Analysis</text>
    <text x="155" y="53" font-family="Arial" font-size="8" fill="#22C55E">97.1%</text>
    
    <circle cx="8" cy="70" r="5" fill="#22C55E"/>
    <text x="8" y="73" font-family="Arial" font-size="6" fill="white" text-anchor="middle">✓</text>
    <text x="20" y="73" font-family="Arial" font-size="8" fill="#8AAAD0">Forgery Detection</text>
    <text x="148" y="73" font-family="Arial" font-size="8" fill="#22C55E">No Threat</text>
  </g>

  <!-- Download report button -->
  <rect x="38" y="338" width="164" height="36" rx="8" fill="#1A3C8F"/>
  <text x="120" y="361" font-family="Arial" font-size="10" font-weight="700" fill="white" text-anchor="middle">↓ Download Report</text>
  
  <!-- Bottom nav -->
  <rect x="18" y="400" width="204" height="50" rx="12" fill="#0D1B4B"/>
  <text x="65" y="430" font-family="Arial" font-size="8" fill="#5A7AAA" text-anchor="middle">🏠 Home</text>
  <text x="120" y="430" font-family="Arial" font-size="8" fill="#2A5CC8" text-anchor="middle">✓ Verify</text>
  <text x="175" y="430" font-family="Arial" font-size="8" fill="#5A7AAA" text-anchor="middle">⚙ Settings</text>
</svg>
